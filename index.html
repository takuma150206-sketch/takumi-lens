<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>匠の眼 v0.4</title>

  <!-- A-Frame + AR.js（実績ある組み合わせ） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Share+Tech+Mono&display=swap');
    :root {
      --green:  #00ff88;
      --red:    #ff3b3b;
      --yellow: #ffe033;
      --panel:  rgba(8,12,18,0.88);
      --border: rgba(0,255,136,0.22);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    /* AR.jsが生成するcanvasとvideoを全画面に */
    canvas, video {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      object-fit: cover !important;
    }

    /* HUD（AR.jsの上に重ねる） */
    #hud {
      position: fixed; inset: 0; z-index: 999;
      pointer-events: none;
      display: flex; flex-direction: column;
      justify-content: space-between; padding: 16px;
    }

    #topBar {
      display: flex; align-items: center; gap: 10px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 14px;
      backdrop-filter: blur(10px); width: fit-content;
    }
    .logo { font-weight: 900; font-size: .95rem; color: var(--green); letter-spacing: .05em; }
    .ver  { font-family: 'Share Tech Mono', monospace; font-size: .65rem; color: #3a5060; }
    #dot  { width: 8px; height: 8px; border-radius: 50%; background: #2a3a44; margin-left: 6px; transition: background .3s, box-shadow .3s; }
    #dot.ok   { background: var(--green); box-shadow: 0 0 8px var(--green); }
    #dot.lost { background: var(--red);   box-shadow: 0 0 6px var(--red); }

    #anglWrap {
      position: fixed; top: 42%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999; text-align: center;
      pointer-events: none; opacity: 0; transition: opacity .25s;
    }
    #anglWrap.show { opacity: 1; }
    #anglNum {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(5rem, 20vw, 10rem);
      line-height: 1; color: var(--green);
      text-shadow: 0 0 40px rgba(0,255,136,.5);
      transition: color .15s, text-shadow .15s;
    }
    #anglNum.warn { color: var(--yellow); text-shadow: 0 0 40px rgba(255,224,51,.5); }
    #anglNum.bad  { color: var(--red);    text-shadow: 0 0 40px rgba(255,59,59,.5); }
    #anglSub { font-size: .8rem; letter-spacing: .18em; color: #5a7888; margin-top: 6px; font-family: 'Share Tech Mono', monospace; }

    #gaugeWrap {
      position: fixed; bottom: 105px; left: 50%;
      transform: translateX(-50%);
      width: min(460px, 86vw); z-index: 999;
      pointer-events: none; opacity: 0; transition: opacity .25s;
    }
    #gaugeWrap.show { opacity: 1; }
    #track { height: 5px; background: rgba(255,255,255,.1); border-radius: 99px; position: relative; }
    #ideal { position: absolute; left: calc(15/90*100%); width: calc(20/90*100%); height: 100%; background: rgba(0,255,136,.3); border-radius: 99px; }
    #thumb { position: absolute; top: 50%; width: 13px; height: 13px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); transform: translate(-50%,-50%); transition: left .1s linear, background .15s; }
    #thumb.warn { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
    #thumb.bad  { background: var(--red);    box-shadow: 0 0 8px var(--red); }
    #gLabels { display: flex; justify-content: space-between; margin-top: 5px; font-family: 'Share Tech Mono', monospace; font-size: .6rem; color: #2a4050; }
    #gIdeal  { text-align: center; font-size: .65rem; color: rgba(0,255,136,.55); margin-top: 3px; }

    #btmBar { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 9px; padding: 9px 16px; backdrop-filter: blur(10px); text-align: center; min-width: 120px; }
    .clabel { font-size: .58rem; letter-spacing: .18em; color: #3a5060; margin-bottom: 3px; }
    .cval   { font-family: 'Share Tech Mono', monospace; font-size: 1rem; color: #b8ccd8; }
    #fbVal  { font-size: .8rem; font-family: 'Noto Sans JP', sans-serif; }

    #noMark {
      position: fixed; bottom: 160px; left: 50%;
      transform: translateX(-50%);
      z-index: 999; pointer-events: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: .72rem; color: #3a5060; letter-spacing: .12em;
    }

    #dbg {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
      background: rgba(0,0,0,.8); font-family: 'Share Tech Mono', monospace;
      font-size: .58rem; color: #3a8060; padding: 4px 8px;
      pointer-events: none; white-space: nowrap; overflow: hidden;
    }

    /* スタート画面 */
    #start {
      position: fixed; inset: 0; z-index: 10000;
      background: #0a0c0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 26px; padding: 28px;
      transition: opacity .5s;
    }
    #start.hide { opacity: 0; pointer-events: none; }
    .sLogo { font-weight: 900; font-size: clamp(2.4rem, 9vw, 4.5rem); color: var(--green); letter-spacing: .08em; text-shadow: 0 0 60px rgba(0,255,136,.25); font-family: 'Noto Sans JP', sans-serif; }
    .sSub  { font-size: .75rem; color: #3a5060; letter-spacing: .2em; font-family: 'Share Tech Mono', monospace; }
    .sBox  { background: rgba(0,255,136,.04); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; width: 100%; max-width: 400px; color: #d0dde8; font-family: 'Noto Sans JP', sans-serif; }
    .sBox h3 { font-size: .6rem; letter-spacing: .22em; color: #3a5060; margin-bottom: 12px; }
    .sRow { display: flex; gap: 12px; margin-bottom: 10px; font-size: .82rem; line-height: 1.55; }
    .sN   { font-family: 'Share Tech Mono', monospace; color: var(--green); font-size: .7rem; padding-top: 2px; flex-shrink: 0; }
    #startBtn {
      background: var(--green); color: #040804;
      border: none; border-radius: 10px;
      padding: 15px 44px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 700; font-size: 1rem; letter-spacing: .1em;
      cursor: pointer; pointer-events: auto;
      box-shadow: 0 0 28px rgba(0,255,136,.3);
      transition: transform .12s;
    }
    #startBtn:active { transform: scale(.96); }
    .sNote { font-size: .68rem; color: #2a4050; text-align: center; line-height: 1.8; max-width: 320px; font-family: 'Noto Sans JP', sans-serif; }
  </style>
</head>
<body>

<!-- AR.js シーン（マーカー認識はここで行う） -->
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 4x4_BCH_13_9_3;"
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true; precision: medium;"
  id="arScene"
  style="display:none;"
>
  <!-- ID:0のマーカー -->
  <a-marker
    id="marker0"
    type="barcode"
    value="0"
    smooth="true"
    smoothCount="5"
    smoothTolerance="0.01"
    smoothThreshold="2"
  >
    <!-- マーカー上に表示する3Dオブジェクト（認識確認用の緑の枠） -->
    <a-box
      position="0 0.05 0"
      scale="1 0.1 1"
      color="#00ff88"
      opacity="0.6"
      material="wireframe: true; wireframeLinewidth: 3;"
    ></a-box>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<!-- HUD -->
<div id="hud">
  <div id="topBar">
    <span class="logo">匠の眼</span>
    <span class="ver">v0.4 AR.js</span>
    <div id="dot"></div>
  </div>
  <div id="btmBar">
    <div class="card"><div class="clabel">コテ角度</div><div class="cval" id="angCard">--°</div></div>
    <div class="card"><div class="clabel">理想範囲</div><div class="cval">15°– 35°</div></div>
    <div class="card"><div class="clabel">フィードバック</div><div class="cval" id="fbVal">待機中</div></div>
  </div>
</div>

<div id="anglWrap"><div id="anglNum">--</div><div id="anglSub">TROWEL ANGLE</div></div>
<div id="gaugeWrap">
  <div id="track"><div id="ideal"></div><div id="thumb"></div></div>
  <div id="gLabels"><span>0°</span><span>15°</span><span>35°</span><span>60°</span><span>90°</span></div>
  <div id="gIdeal">▲ 理想範囲 15°〜35°</div>
</div>
<div id="noMark">マーカーをカメラに向けてください</div>
<div id="dbg">初期化中...</div>

<!-- スタート画面 -->
<div id="start">
  <div class="sLogo">匠の眼</div>
  <div class="sSub">TAKUMI LENS v0.4 — AR.js</div>
  <div class="sBox">
    <h3>使い方</h3>
    <div class="sRow"><span class="sN">01</span><span>v0.4用マーカー（4x4_BCH）を印刷してコテに貼る</span></div>
    <div class="sRow"><span class="sN">02</span><span>「起動」を押すとカメラが自動で開く</span></div>
    <div class="sRow"><span class="sN">03</span><span>マーカーをカメラに向けると角度が表示される</span></div>
    <div class="sRow"><span class="sN">04</span><span>緑=理想（15〜35°）　黄=要調整　赤=NG</span></div>
  </div>
  <button id="startBtn">起動</button>
  <p class="sNote">カメラ許可のダイアログが出たら「許可」を選んでください。</p>
</div>

<script>
const dot      = document.getElementById('dot');
const anglWrap = document.getElementById('anglWrap');
const anglNum  = document.getElementById('anglNum');
const gaugeWrap= document.getElementById('gaugeWrap');
const thumb    = document.getElementById('thumb');
const angCard  = document.getElementById('angCard');
const fbVal    = document.getElementById('fbVal');
const noMark   = document.getElementById('noMark');
const dbgEl    = document.getElementById('dbg');
const arScene  = document.getElementById('arScene');
const marker0  = document.getElementById('marker0');

let smoothAngle = 25;
let detected = false;
let lastSeen = 0;

function log(msg) { dbgEl.textContent = msg; }

function updateUI(angle, isDetected) {
  const a = Math.round(angle);
  const good = a >= 15 && a <= 35;
  const bad  = a < 10 || a > 55;
  const cls  = good ? '' : bad ? 'bad' : 'warn';

  anglNum.textContent = a;
  anglNum.className = cls;
  angCard.textContent = a + '°';
  thumb.className = cls;
  thumb.style.left = Math.min(Math.max(a/90*100,0),100) + '%';

  let fb = '良好です ✓';
  if      (a < 10) fb = '寝すぎています';
  else if (a < 15) fb = 'もう少し立てて';
  else if (a > 55) fb = '立てすぎています';
  else if (a > 35) fb = '少し寝かせて';
  fbVal.textContent = fb;

  anglWrap.classList.toggle('show', isDetected);
  gaugeWrap.classList.toggle('show', isDetected);
  noMark.style.opacity = isDetected ? '0' : '1';
  dot.className = isDetected ? 'ok' : 'lost';
}

// マーカーのrotationから「コテの壁面角度」を計算
function calcTrowelAngle(rotation) {
  // AR.jsはrotation.xが壁面に対する傾きを表す（ラジアン）
  // コテが水平=0°、垂直=90°
  const rx = THREE.MathUtils.radToDeg(rotation.x);
  const ry = THREE.MathUtils.radToDeg(rotation.y);
  const rz = THREE.MathUtils.radToDeg(rotation.z);

  // 主に使うのはX軸の回転（前後の傾き）
  // 0°=マーカーが正面向き（コテ水平）、90°=コテ垂直
  const angle = Math.abs(rx) % 180;
  const normalized = angle > 90 ? 180 - angle : angle;
  return normalized;
}

// AR.jsのマーカーイベントを監視
function setupMarkerEvents() {
  marker0.addEventListener('markerFound', () => {
    detected = true;
    lastSeen = Date.now();
    log('✓ マーカー検出！');
  });

  marker0.addEventListener('markerLost', () => {
    detected = false;
    log('マーカーロスト');
  });

  // 毎フレーム角度を取得
  function tick() {
    if (detected) {
      const obj = marker0.object3D;
      const rotation = obj.rotation;
      const angle = calcTrowelAngle(rotation);
      smoothAngle = smoothAngle * 0.7 + angle * 0.3;
      updateUI(smoothAngle, true);
      log(`✓ 検出中 | rx:${Math.round(THREE.MathUtils.radToDeg(rotation.x))}° ry:${Math.round(THREE.MathUtils.radToDeg(rotation.y))}° → コテ角:${Math.round(smoothAngle)}°`);
    } else {
      // 2秒後に非表示
      if (Date.now() - lastSeen > 2000) {
        updateUI(smoothAngle, false);
      }
    }
    requestAnimationFrame(tick);
  }
  tick();
}

// 起動ボタン
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('start').classList.add('hide');
  arScene.style.display = 'block';
  log('AR.js起動中...');

  // A-Frameのロードを待ってからイベント設定
  arScene.addEventListener('loaded', () => {
    log('AR.js準備完了 — マーカーを探しています');
    setupMarkerEvents();
  });

  // タイムアウト保険（loadedが発火しない場合）
  setTimeout(() => {
    if (dbgEl.textContent === 'AR.js起動中...') {
      log('AR.js起動完了（タイムアウト経由）');
      setupMarkerEvents();
    }
  }, 3000);
});

log('準備完了 — 起動ボタンを押してください');
</script>
</body>
</html>
